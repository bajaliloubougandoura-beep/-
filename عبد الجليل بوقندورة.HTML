<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ديدو ضد الوحوش</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Tahoma, sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    body {
      background: radial-gradient(circle at top, #0f172a, #020617 70%);
      overflow: hidden;
      color: white;
    }

    #game {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .title {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 1000;
      font-size: 39px;
      font-weight: bold;
      color: #facc15;
      text-shadow: 0 0 12px rgba(250,204,21,0.8);
    }

    .hud {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1000;
      background: rgba(0,0,0,0.35);
      padding: 12px 18px;
      border-radius: 16px;
      backdrop-filter: blur(8px);
      box-shadow: 0 0 15px rgba(0,0,0,0.4);
      font-size: 27px; !important;
      line-height: 1.8;
      min-width: 190px;
    }

    #hearts {
      font-size: 26px;
      letter-spacing: 4px;
    }

    #player {
      position: absolute;
      width: 84px;
      height: 84px;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      filter: drop-shadow(0 0 18px rgba(56,189,248,0.7));
      transition: transform 0.08s;
    }

    .shielded {
      filter: drop-shadow(0 0 20px rgba(34,197,94,0.95)) drop-shadow(0 0 35px rgba(34,197,94,0.8));
    }

    .bullet {
      position: absolute;
      width: 8px;
      height: 24px;
      border-radius: 20px;
      background: linear-gradient(to bottom, #fef08a, #f59e0b);
      box-shadow: 0 0 12px yellow;
      z-index: 15;
    }

    .powerBullet {
      position: absolute;
      width: 16px;
      height: 34px;
      border-radius: 20px;
      background: linear-gradient(to bottom, #a78bfa, #7c3aed);
      box-shadow: 0 0 18px #c084fc;
      z-index: 16;
    }

    .enemy, .boss, .coin, .heartDrop, .shieldDrop, .powerDrop {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      animation: floatEnemy 1s ease-in-out infinite alternate;
    }

    .enemy {
      width: 65px;
      height: 65px;
      font-size: 44px;
      filter: drop-shadow(0 0 10px rgba(239,68,68,0.7));
    }

    .boss {
      width: 110px;
      height: 110px;
      font-size: 76px;
      z-index: 18;
      filter: drop-shadow(0 0 18px rgba(168,85,247,0.9));
      animation: bossFloat 0.8s ease-in-out infinite alternate;
    }

    .coin, .heartDrop, .shieldDrop, .powerDrop {
      width: 42px;
      height: 42px;
      font-size: 28px;
      z-index: 12;
    }

    @keyframes floatEnemy {
      from { transform: translateY(0px) rotate(-5deg); }
      to { transform: translateY(6px) rotate(5deg); }
    }

    @keyframes bossFloat {
      from { transform: translateY(0px) scale(1) rotate(-2deg); }
      to { transform: translateY(5px) scale(1.04) rotate(2deg); }
    }

    .star {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      opacity: 0.7;
      animation: twinkle 2s infinite alternate;
    }

    @keyframes twinkle {
      from { opacity: 0.2; transform: scale(1); }
      to { opacity: 1; transform: scale(1.8); }
    }

    .boom {
      position: absolute;
      font-size: 34px;
      animation: boomAnim 0.45s ease-out forwards;
      pointer-events: none;
      z-index: 40;
    }

    @keyframes boomAnim {
      from { transform: scale(0.5); opacity: 1; }
      to { transform: scale(1.8); opacity: 0; }
    }

    #controls {
      position: absolute;
      bottom: 18px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 16px;
      z-index: 1000;
    }

    .btn {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.13);
      color: white;
      font-size: 28px;
      font-weight: bold;
      backdrop-filter: blur(6px);
      box-shadow: 0 0 15px rgba(255,255,255,0.15);
      cursor: pointer;
      transition: 0.15s;
    }

    .btn:active {
      transform: scale(0.92);
      background: rgba(255,255,255,0.25);
    }

    #messageBox, #legendBox {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2000;
      text-align: center;
      pointer-events: none;
      display: none;
    }

    #messageBox {
      top: 90px;
      font-size: 36px;
      font-weight: bold;
      color: #facc15;
      text-shadow: 0 0 18px rgba(250,204,21,1);
      animation: popIn 0.5s ease;
    }

    #legendBox {
      top: 150px;
      font-size: 44px;
      font-weight: bold;
      color: #22c55e;
      text-shadow: 0 0 22px rgba(34,197,94,1);
      animation: popIn 0.5s ease;
    }

    @keyframes popIn {
      from { opacity: 0; transform: translateX(-50%) scale(0.7); }
      to { opacity: 1; transform: translateX(-50%) scale(1); }
    }

    #gameOver {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.84);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 3000;
      text-align: center;
      padding: 20px;
    }

    #gameOver h1 {
      font-size: 110px;
      color: #ff4d4d;
      margin-bottom: 20px;
    }

    #gameOver p {
      font-size: 107px;
      margin-bottom: 25px;
    }

    #restartBtn {
      padding: 15px 30px;
      font-size: 100px;
      border: none;
      border-radius: 15px;
      background: linear-gradient(135deg, #22c55e, #15803d);
      color: white;
      cursor: pointer;
      box-shadow: 0 0 20px rgba(34,197,94,0.5);
    }
  </style>
</head>
<body>
  <div id="game">
    <div class="title">🚀 ديدو ضد الوحوش</div>

    <div class="hud">
      <div>🏆 النقاط: <span id="score">0</span></div>
      <div> 💵
العملة:<span id="coins">0</span></div>
      <div>❤️ الحياة: <span id="hearts">❤️❤️❤️</span></div>
      <div>🛡️ الدرع: <span id="shieldText">لا</span></div>
      <div>⚡ السلاح: <span id="weaponText">عادي</span></div>
    </div>

    <div id="messageBox">🐉 الزعيم ظهر!</div>
    <div id="legendBox">👑 ديدو أسطورة 👑</div>

    <div id="player">
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <polygon points="50,5 75,75 50,62 25,75" fill="#38bdf8" stroke="white" stroke-width="3"/>
        <polygon points="50,20 62,78 50,68 38,78" fill="#2563eb"/>
        <polygon points="18,68 38,58 34,78" fill="#7dd3fc"/>
        <polygon points="82,68 62,58 66,78" fill="#7dd3fc"/>
        <circle cx="50" cy="40" r="7" fill="#fef08a" stroke="white" stroke-width="2"/>
        <rect x="43" y="75" width="5" height="12" fill="#f97316"/>
        <rect x="52" y="75" width="5" height="12" fill="#f97316"/>
      </svg>
    </div>

    <div id="controls">
      <button class="btn" id="leftBtn">◀</button>
      <button class="btn" id="shootBtn">🔥</button>
      <button class="btn" id="rightBtn">▶</button>
    </div>

    <div id="gameOver">
      <h1>💀 انتهت اللعبة</h1>
      <p>النقاط النهائية: <span id="finalScore">0</span></p>
      <button id="restartBtn">🔄 إعادة اللعب</button>
    </div>
  </div>

  <script>
    const game = document.getElementById("game");
    const player = document.getElementById("player");
    const scoreEl = document.getElementById("score");
    const coinsEl = document.getElementById("coins");
    const heartsEl = document.getElementById("hearts");
    const shieldText = document.getElementById("shieldText");
    const weaponText = document.getElementById("weaponText");
    const gameOverScreen = document.getElementById("gameOver");
    const finalScore = document.getElementById("finalScore");
    const restartBtn = document.getElementById("restartBtn");
    const messageBox = document.getElementById("messageBox");
    const legendBox = document.getElementById("legendBox");

    const leftBtn = document.getElementById("leftBtn");
    const rightBtn = document.getElementById("rightBtn");
    const shootBtn = document.getElementById("shootBtn");

    let score = 0;
    let coins = 0;
    let lives = 3;
    let playerX = window.innerWidth / 2 - 42;

    let bullets = [];
    let enemies = [];
    let drops = [];

    let gameRunning = true;
    let moveLeft = false;
    let moveRight = false;
    let shootPressed = false;

    let lastShotTime = 0;
    let shotCooldown = 220;

    let hasShield = false;
    let powerMode = false;
    let bossSpawnedAt100 = false;
    let legendShown = false;

    player.style.left = playerX + "px";

    for (let i = 0; i < 90; i++) {
      const star = document.createElement("div");
      star.classList.add("star");
      star.style.left = Math.random() * window.innerWidth + "px";
      star.style.top = Math.random() * window.innerHeight + "px";
      star.style.animationDuration = (1 + Math.random() * 3) + "s";
      game.appendChild(star);
    }

    function updateHearts() {
      heartsEl.textContent = "❤️".repeat(lives);
      if (lives <= 0) heartsEl.textContent = "💔";
    }

    function showMessage(text, duration = 1800) {
      messageBox.textContent = text;
      messageBox.style.display = "block";
      setTimeout(() => {
        messageBox.style.display = "none";
      }, duration);
    }

    function showLegend() {
      if (legendShown) return;
      legendShown = true;
      legendBox.style.display = "block";
      setTimeout(() => {
        legendBox.style.display = "none";
      }, 3000);
    }

    function createExplosion(x, y, emoji = "💥") {
      const boom = document.createElement("div");
      boom.classList.add("boom");
      boom.textContent = emoji;
      boom.style.left = x + "px";
      boom.style.top = y + "px";
      game.appendChild(boom);

      setTimeout(() => boom.remove(), 450);
    }

    function updateTexts() {
      shieldText.textContent = hasShield ? "نعم" : "لا";
      weaponText.textContent = powerMode ? "قوي" : "عادي";
      scoreEl.textContent = score;
      coinsEl.textContent = coins;
      updateHearts();
    }

    function shootBullet() {
      const now = Date.now();
      if (!gameRunning || now - lastShotTime < shotCooldown) return;
      lastShotTime = now;

      if (powerMode) {
        createBullet(playerX + 18, true);
        createBullet(playerX + 58, true);
      } else {
        createBullet(playerX + 38, false);
      }
    }

    function createBullet(x, strong = false) {
      const bullet = document.createElement("div");
      bullet.className = strong ? "powerBullet" : "bullet";
      bullet.style.left = x + "px";
      bullet.style.top = (window.innerHeight - 128) + "px";
      game.appendChild(bullet);

      bullets.push({
        el: bullet,
        x: x,
        y: window.innerHeight - 128,
        w: strong ? 16 : 8,
        h: strong ? 34 : 24,
        strong: strong
      });
    }

    function spawnEnemy() {
      if (!gameRunning) return;

      const enemy = document.createElement("div");
      enemy.classList.add("enemy");

      const monsters = ["👾", "👹", "👺", "😈", "🧟", "👻"];
      enemy.textContent = monsters[Math.floor(Math.random() * monsters.length)];

      const x = Math.random() * (window.innerWidth - 70);
      enemy.style.left = x + "px";
      enemy.style.top = "-70px";
      game.appendChild(enemy);

      enemies.push({
        type: "enemy",
        el: enemy,
        x: x,
        y: -70,
        w: 65,
        h: 65,
        speed: 2 + Math.random() * 2.4,
        hp: 1
      });
    }

    function spawnBoss() {
      if (!gameRunning) return;

      const boss = document.createElement("div");
      boss.classList.add("boss");
      boss.textContent = "🐉";

      const x = Math.random() * (window.innerWidth - 120);
      boss.style.left = x + "px";
      boss.style.top = "-120px";
      game.appendChild(boss);

      enemies.push({
        type: "boss",
        el: boss,
        x: x,
        y: -120,
        w: 110,
        h: 110,
        speed: 1.5,
        hp: 8
      });

      showMessage("🐉 الزعيم ظهر!");
    }

    function spawnDrop(type, x, y) {
      const drop = document.createElement("div");

      if (type === "coin") {
        drop.classList.add("coin");
        drop.textContent = "🪙";
      } else if (type === "heart") {
        drop.classList.add("heartDrop");
        drop.textContent = "💚";
      } else if (type === "shield") {
        drop.classList.add("shieldDrop");
        drop.textContent = "🛡️";
      } else if (type === "power") {
        drop.classList.add("powerDrop");
        drop.textContent = "⚡";
      }

      drop.style.left = x + "px";
      drop.style.top = y + "px";
      game.appendChild(drop);

      drops.push({
        type,
        el: drop,
        x,
        y,
        w: 42,
        h: 42,
        speed: 2.5
      });
    }

    function randomDrop(x, y) {
      const r = Math.random();
      if (r < 0.45) spawnDrop("coin", x, y);
      else if (r < 0.62) spawnDrop("heart", x, y);
      else if (r < 0.78) spawnDrop("shield", x, y);
      else if (r < 0.94) spawnDrop("power", x, y);
    }

    function hitPlayer() {
      if (hasShield) {
        hasShield = false;
        player.classList.remove("shielded");
        showMessage("🛡️ الدرع حماك!");
        updateTexts();
        return;
      }

      lives--;
      updateTexts();
      createExplosion(playerX + 20, window.innerHeight - 120, "💢");

      if (lives <= 0) {
        endGame();
      }
    }

    function endGame() {
      gameRunning = false;
      finalScore.textContent = score;
      gameOverScreen.style.display = "flex";
    }

    function restartGame() {
      score = 0;
      coins = 0;
      lives = 3;
      playerX = window.innerWidth / 2 - 42;
      bullets.forEach(b => b.el.remove());
      enemies.forEach(e => e.el.remove());
      drops.forEach(d => d.el.remove());
      bullets = [];
      enemies = [];
      drops = [];
      hasShield = false;
      powerMode = false;
      bossSpawnedAt100 = false;
      legendShown = false;
      shotCooldown = 220;
      gameRunning = true;
      gameOverScreen.style.display = "none";
      legendBox.style.display = "none";
      player.classList.remove("shielded");
      player.style.left = playerX + "px";
      updateTexts();
      updateGame();
    }

    function rectHit(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function updateGame() {
      if (!gameRunning) return;

      if (moveLeft) playerX -= 6;
      if (moveRight) playerX += 6;

      if (playerX < 0) playerX = 0;
      if (playerX > window.innerWidth - 84) playerX = window.innerWidth - 84;

      player.style.left = playerX + "px";

      if (shootPressed) shootBullet();

      if (score === 100) {
        showLegend();
      }

      if (score >= 100 && !bossSpawnedAt100) {
        bossSpawnedAt100 = true;
        spawnBoss();
      }

      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= bullets[i].strong ? 13 : 10;
        bullets[i].el.style.top = bullets[i].y + "px";

        if (bullets[i].y < -40) {
          bullets[i].el.remove();
          bullets.splice(i, 1);
        }
      }

      const playerBox = {
        x: playerX + 5,
        y: window.innerHeight - 110,
        w: 74,
        h: 74
      };

      for (let e = enemies.length - 1; e >= 0; e--) {
        const enemy = enemies[e];
        enemy.y += enemy.speed;
        enemy.el.style.top = enemy.y + "px";

        if (enemy.y > window.innerHeight + 20) {
          enemy.el.remove();
          enemies.splice(e, 1);
          continue;
        }

        if (rectHit(enemy, playerBox)) {
          createExplosion(enemy.x, enemy.y);
          enemy.el.remove();
          enemies.splice(e, 1);
          hitPlayer();
          continue;
        }

        for (let b = bullets.length - 1; b >= 0; b--) {
          if (rectHit(bullets[b], enemy)) {
            bullets[b].el.remove();
            bullets.splice(b, 1);

            enemy.hp--;

            if (enemy.hp <= 0) {
              createExplosion(enemy.x, enemy.y, enemy.type === "boss" ? "🔥" : "💥");
              enemy.el.remove();

              if (enemy.type === "boss") {
                score += 40;
                coins += 10;
                spawnDrop("coin", enemy.x + 30, enemy.y + 20);
                spawnDrop("heart", enemy.x + 50, enemy.y + 40);
                spawnDrop("shield", enemy.x + 20, enemy.y + 30);
                showMessage("🏆 هزمت الزعيم!");
              } else {
                score += 10;
                if (Math.random() < 0.45) randomDrop(enemy.x, enemy.y);
              }

              enemies.splice(e, 1);
              updateTexts();
              break;
            }
          }
        }
      }

      for (let d = drops.length - 1; d >= 0; d--) {
        drops[d].y += drops[d].speed;
        drops[d].el.style.top = drops[d].y + "px";

        if (drops[d].y > window.innerHeight + 20) {
          drops[d].el.remove();
          drops.splice(d, 1);
          continue;
        }

        if (rectHit(drops[d], playerBox)) {
          if (drops[d].type === "coin") {
            coins += 1;
            showMessage("🪙 أخذت عملة!", 800);
          } else if (drops[d].type === "heart") {
            if (lives < 5) lives += 1;
            showMessage("💚 قلب إضافي!", 1000);
          } else if (drops[d].type === "shield") {
            hasShield = true;
            player.classList.add("shielded");
            showMessage("🛡️ حصلت على درع!", 1200);
          } else if (drops[d].type === "power") {
            powerMode = true;
            shotCooldown = 140;
            showMessage("⚡ سلاح قوي!", 1200);

            setTimeout(() => {
              powerMode = false;
              shotCooldown = 220;
              updateTexts();
            }, 7000);
          }

          updateTexts();
          drops[d].el.remove();
          drops.splice(d, 1);
        }
      }

      requestAnimationFrame(updateGame);
    }

    function holdStart(action) {
      if (action === "left") moveLeft = true;
      if (action === "right") moveRight = true;
      if (action === "shoot") shootPressed = true;
    }

    function holdEnd(action) {
      if (action === "left") moveLeft = false;
      if (action === "right") moveRight = false;
      if (action === "shoot") shootPressed = false;
    }

    leftBtn.addEventListener("touchstart", (e) => { e.preventDefault(); holdStart("left"); });
    leftBtn.addEventListener("touchend", () => holdEnd("left"));
    leftBtn.addEventListener("mousedown", () => holdStart("left"));
    leftBtn.addEventListener("mouseup", () => holdEnd("left"));
    leftBtn.addEventListener("mouseleave", () => holdEnd("left"));

    rightBtn.addEventListener("touchstart", (e) => { e.preventDefault(); holdStart("right"); });
    rightBtn.addEventListener("touchend", () => holdEnd("right"));
    rightBtn.addEventListener("mousedown", () => holdStart("right"));
    rightBtn.addEventListener("mouseup", () => holdEnd("right"));
    rightBtn.addEventListener("mouseleave", () => holdEnd("right"));

    shootBtn.addEventListener("touchstart", (e) => { e.preventDefault(); holdStart("shoot"); });
    shootBtn.addEventListener("touchend", () => holdEnd("shoot"));
    shootBtn.addEventListener("mousedown", () => holdStart("shoot"));
    shootBtn.addEventListener("mouseup", () => holdEnd("shoot"));
    shootBtn.addEventListener("mouseleave", () => holdEnd("shoot"));

    document.addEventListener("keydown", (e) => {
      if (e.key === "ArrowLeft") moveLeft = true;
      if (e.key === "ArrowRight") moveRight = true;
      if (e.key === " " || e.key === "ArrowUp") shootPressed = true;
    });

    document.addEventListener("keyup", (e) => {
      if (e.key === "ArrowLeft") moveLeft = false;
      if (e.key === "ArrowRight") moveRight = false;
      if (e.key === " " || e.key === "ArrowUp") shootPressed = false;
    });

    restartBtn.addEventListener("click", restartGame);

    setInterval(() => {
      if (gameRunning) spawnEnemy();
    }, 850);

    setInterval(() => {
      if (gameRunning && Math.random() < 0.28) spawnEnemy();
    }, 1400);

    updateTexts();
    updateGame();

    window.addEventListener("resize", () => {
      if (playerX > window.innerWidth - 84) {
        playerX = window.innerWidth - 84;
        player.style.left = playerX + "px";
      }
    });
  </script>
</body>
</html>
